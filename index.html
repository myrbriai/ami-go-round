const PROGRESS_KEY = (id) => `tracker-progress:${id}`;

function loadProgress(id) {
  try { const s = localStorage.getItem(PROGRESS_KEY(id)); return s ? JSON.parse(s) : {}; }
  catch (e) { return {}; }
}
function saveProgress(id, checked) {
  try { localStorage.setItem(PROGRESS_KEY(id), JSON.stringify(checked)); }

  catch (e) { console.error('Save user patterns failed:', e); }
}

// ============================================================
//   PARSER
// ============================================================
function parsePatternText(text) {
  const lines = text.split('\n').map((l) => l.trim()).filter((l) => l.length > 0);
  const sections = [];
  let currentSection = null;
  let rowIdCounter = 0;

  const rowRegex = /^(rnd|round|row)\s*\.?\s*(\d+(?:\s*[\-–]\s*\d+)?)\s*[:\-–.]?\s*(.+)$/i;
  const countRegex = /\(([\d+\-\s]+)\)\s*$/;
  const startRegex = /^(start(?:s|ing)?\s+with|begin\s+with|chain)\s+/i;

  const ensureSection = () => {
    if (!currentSection) {
      currentSection = { section: 'Pattern', theme: THEME_ORDER[sections.length % THEME_ORDER.length], notes: '', rows: [] };
      sections.push(currentSection);
    }
    return currentSection;
  };
  const addRow = (label, count = '') => {
    const sec = ensureSection();
    rowIdCounter += 1;
    sec.rows.push({ id: `r-${rowIdCounter}`, label: label.trim(), count: count ? `(${count})` : '' });
  };
  const startNewSection = (name) => {
    currentSection = { section: name.trim(), theme: THEME_ORDER[sections.length % THEME_ORDER.length], notes: '', rows: [] };
    sections.push(currentSection);
  };

  for (const line of lines) {
    if (/^(abbreviations?|notes?|materials?|gauge)\s*:?\s*$/i.test(line)) continue;
    if (line.startsWith('#')) { startNewSection(line.replace(/^#+\s*/, '')); continue; }
    const rowMatch = line.match(rowRegex);
    if (rowMatch) {
      const [, kind, num, rest] = rowMatch;
      const countMatch = rest.match(countRegex);
      let label = `${kind.charAt(0).toUpperCase() + kind.slice(1).toLowerCase()} ${num}: `;
      let instruction = rest;
      let count = '';
      if (countMatch) { count = countMatch[1].trim(); instruction = rest.replace(countRegex, '').trim(); }
      label += instruction;
      addRow(label, count);
      continue;
    }
    if (startRegex.test(line)) { addRow(line); continue; }
    if (/^[A-Z][\w\s()&\-]{0,40}:?$/.test(line) && line.split(/\s+/).length <= 4) {
      startNewSection(line.replace(/:$/, ''));
      continue;
    }
    if (line.length > 0) addRow(line);
  }
  return sections.filter((s) => s.rows.length > 0);
}

function useHashRoute() {
  const [route, setRoute] = useState(() => window.location.hash.replace(/^#\//, '') || '');
  useEffect(() => {
    const on = () => setRoute(window.location.hash.replace(/^#\//, '') || '');
    window.addEventListener('hashchange', on);
    return () => window.removeEventListener('hashchange', on);
  }, []);
  return route;
}
const navigate = (path) => { window.location.hash = '#/' + path; };

// Brand header — appears at top of every page
function BrandHeader({ small = false }) {
  return (
    <div className={`text-center ${small ? 'mb-6 pt-4' : 'mb-8 pt-6'}`}>
      <img
        src={LOGO_SRC}
        alt="ami-go-round"
        className={`mx-auto ${small ? 'w-24 h-24' : 'w-44 h-44 sm:w-52 sm:h-52'}`}
      />
      <h1 className={`font-serif font-normal tracking-tight text-ink mt-1 ${small ? 'text-2xl' : 'text-4xl sm:text-5xl'}`}>
        ami-go-round
      </h1>
      <p className={`font-script text-teal-deep mt-1 ${small ? 'text-lg' : 'text-2xl sm:text-3xl'}`}>
        deliberate craft. endless play.
      </p>
    </div>
  );
}

// ============================================================
//   HOME PAGE
// ============================================================
function HomePage({ allPatterns, onDelete }) {
  const projects = Object.values(allPatterns);

  return (
    <div className="min-h-screen p-4 pb-12">
      <div className="max-w-2xl mx-auto">
        <BrandHeader />

        <div className="flex items-center gap-3 mb-4">
          <h2 className="font-script text-3xl text-ink">my projects</h2>
          <div className="flex-1 border-b border-dashed border-ink/20" />
          <span className="font-sans text-xs text-ink/50">
            {projects.length} project{projects.length === 1 ? '' : 's'}
          </span>
        </div>

        <div className="space-y-3">
          {projects.map((p) => {
            const total = p.sections.reduce((s, sec) => s + sec.rows.length, 0);
            const ck = loadProgress(p.id);
            const done = Object.keys(ck).filter((k) => ck[k]).length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            const isDone = pct === 100;
            return (
              <div key={p.id} className="bg-cream rounded-2xl shadow-sm hover:shadow-md transition p-5 border border-ink/10">
                <button onClick={() => navigate(p.id)} className="w-full text-left">
                  <div className="flex items-start gap-4">
                    <div className="text-4xl flex-shrink-0">{p.emoji}</div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-baseline justify-between gap-2 mb-1">
                        <h3 className="font-serif font-medium text-lg text-ink truncate">{p.title}</h3>
                        {isDone && <span className="font-script text-sage-deep text-lg">done ✓</span>}
                      </div>
                      {p.blurb && <p className="font-sans text-xs text-ink/60 mb-2">{p.blurb}</p>}
                      <div className="w-full bg-paper rounded-full h-2 overflow-hidden">
                        <div
                          className="h-full bg-gradient-to-r from-teal via-butter to-coral transition-all"
                          style={{ width: `${pct}%` }}
                        />
                      </div>
                      <div className="font-sans text-xs text-ink/50 mt-1">
                        {done} / {total} steps · {pct}%
                      </div>
                    </div>
                  </div>
                </button>
                {p.userCreated && (
                  <div className="mt-3 pt-3 border-t border-ink/10 flex justify-end">
                    <button
                      onClick={() => onDelete(p.id)}
                      className="font-sans text-xs text-ink/40 hover:text-coral-deep"
                    >
                      delete project
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <button
          onClick={() => navigate('builder')}
          className="mt-6 w-full bg-gradient-to-r from-teal via-sage to-butter text-white font-serif text-lg rounded-2xl p-5 shadow-md hover:shadow-lg transition relative overflow-hidden"
        >
          <span className="relative z-10">+ add a new pattern</span>
        </button>

        <p className="font-script text-center text-ink/40 mt-8 text-lg">
          progress saved to this device, always
        </p>
      </div>
    </div>
  );
}

// ============================================================
//   PATTERN BUILDER
// ============================================================
const EXAMPLE_PATTERN_TEXT = `# Body
Start with 6 sc in magic ring
Rnd 1: inc x6 (12)
Rnd 2: [sc, inc] x6 (18)
Rnd 3: [2sc, inc] x6 (24)
Rnd 4-8: 24 sc (24)
Rnd 9: [2sc, dec] x6 (18)
Rnd 10: [sc, dec] x6 (12)
Stuff with fiberfill
Rnd 11: dec x6 (6) - fasten off

# Ears (make 2)
Rnd 1: 6 sc in magic ring (6)
Rnd 2: inc x6 (12)
Rnd 3: 12 sc (12) - fasten off

# Assembly
Sew ears to top of head
Embroider eyes
Weave in all ends`;

function BuilderPage({ onSave }) {
  const [title, setTitle] = useState('');
  const [emoji, setEmoji] = useState('🧶');
  const [blurb, setBlurb] = useState('');
  const [videoUrl, setVideoUrl] = useState('');
  const [rawText, setRawText] = useState('');

  const parsedSections = useMemo(() => parsePatternText(rawText), [rawText]);
  const totalRows = parsedSections.reduce((s, sec) => s + sec.rows.length, 0);
  const canSave = title.trim().length > 0 && totalRows > 0;

  const handleSave = () => {
    if (!canSave) return;
    const id =
      'user-' +
      title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 30) +
      '-' + Math.random().toString(36).slice(2, 6);
    onSave({
      id,
      title: title.trim(),
      emoji: emoji.trim() || '🧶',
      blurb: blurb.trim(),
      videoUrl: videoUrl.trim(),
      sections: parsedSections,
      userCreated: true,
    });
    navigate(id);
  };

  return (
    <div className="min-h-screen p-4 pb-24">
      <div className="max-w-2xl mx-auto">
        <button
          onClick={() => navigate('')}
          className="font-script text-xl text-teal-deep hover:text-teal mb-2 mt-2 inline-flex items-center gap-1"
        >
          ← all projects
        </button>

        <BrandHeader small />

        <div className="text-center mb-6">
          <h2 className="font-serif text-3xl text-ink">add a new pattern</h2>
          <p className="font-script text-xl text-coral-deep mt-1">
            paste a pattern, get a tracker
          </p>
        </div>

        {/* Project metadata */}
        <div className="bg-cream rounded-2xl shadow-sm p-5 mb-4 border border-ink/10">
          <h3 className="font-script text-2xl text-teal-deep mb-3">project details</h3>

          <div className="grid grid-cols-[80px_1fr] gap-3 mb-3">
            <div>
              <label className="font-sans text-xs text-ink/60">Emoji</label>
              <input
                type="text"
                maxLength="4"
                value={emoji}
                onChange={(e) => setEmoji(e.target.value)}
                className="w-full mt-1 px-3 py-2 bg-paper border border-ink/20 rounded-lg text-center text-2xl focus:outline-none focus:border-teal"
              />
            </div>
            <div>
              <label className="font-sans text-xs text-ink/60">Title *</label>
              <input
                type="text"
                value={title}
                placeholder="e.g. Friendly Dragon"
                onChange={(e) => setTitle(e.target.value)}
                className="w-full mt-1 px-3 py-2 bg-paper border border-ink/20 rounded-lg font-serif focus:outline-none focus:border-teal"
              />
            </div>
          </div>

          <div className="mb-3">
            <label className="font-sans text-xs text-ink/60">Short description (optional)</label>
            <input
              type="text"
              value={blurb}
              placeholder="e.g. Brave little dragon, ~5 inches tall"
              onChange={(e) => setBlurb(e.target.value)}
              className="w-full mt-1 px-3 py-2 bg-paper border border-ink/20 rounded-lg focus:outline-none focus:border-teal"
            />
          </div>

          <div>
            <label className="font-sans text-xs text-ink/60">Video URL (optional)</label>
            <input
              type="url"
              value={videoUrl}
              placeholder="https://www.youtube.com/watch?v=..."
              onChange={(e) => setVideoUrl(e.target.value)}
              className="w-full mt-1 px-3 py-2 bg-paper border border-ink/20 rounded-lg font-sans text-sm focus:outline-none focus:border-teal"
            />
          </div>
        </div>

        {/* Pattern text */}
        <div className="bg-cream rounded-2xl shadow-sm p-5 mb-4 border border-ink/10">
          <div className="flex justify-between items-center mb-3">
            <h3 className="font-script text-2xl text-teal-deep">paste the pattern</h3>
            <button
              onClick={() => setRawText(EXAMPLE_PATTERN_TEXT)}
              className="font-sans text-xs text-coral-deep hover:text-coral underline"
            >
              try an example
            </button>
          </div>

          <p className="font-sans text-xs text-ink/60 mb-2">
            Use <code className="bg-paper px-1 rounded">#</code> before a section name (e.g.{' '}
            <code className="bg-paper px-1 rounded"># Body</code>). Lines starting with "Rnd",
            "Round", or "Row" become trackable rows.
          </p>

          <textarea
            value={rawText}
            onChange={(e) => setRawText(e.target.value)}
            placeholder="# Body&#10;Rnd 1: 6 sc in magic ring (6)&#10;Rnd 2: inc x6 (12)..."
            className="w-full h-64 px-3 py-2 bg-paper border border-ink/20 rounded-lg font-mono text-sm focus:outline-none focus:border-teal"
          />
        </div>

        {/* Preview */}
        {parsedSections.length > 0 && (
          <div className="bg-cream rounded-2xl shadow-sm p-5 mb-4 border border-ink/10">
            <div className="flex justify-between items-center mb-3">
              <h3 className="font-script text-2xl text-teal-deep">preview</h3>
              <span className="font-sans text-xs text-ink/60">
                {parsedSections.length} section{parsedSections.length === 1 ? '' : 's'} · {totalRows} row{totalRows === 1 ? '' : 's'}
              </span>
            </div>
            <div className="space-y-3">
              {parsedSections.map((sec, i) => {
                const theme = THEMES[sec.theme];
                return (
                  <div key={i} className={`${theme.bg} ${theme.border} border rounded-lg p-3`}>
                    <h4 className={`font-serif font-medium ${theme.text} mb-1`}>{sec.section}</h4>
                    <ul className="font-sans text-xs text-ink/70 space-y-0.5">
                      {sec.rows.slice(0, 3).map((r) => (
                        <li key={r.id} className="truncate">
                          • {r.label}{' '}
                          {r.count && <span className={`${theme.text} font-semibold`}>{r.count}</span>}
                        </li>
                      ))}
                      {sec.rows.length > 3 && (
                        <li className="text-ink/40 italic">+ {sec.rows.length - 3} more</li>
                      )}
                    </ul>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <button
          onClick={handleSave}
          disabled={!canSave}
          className={`w-full font-serif text-lg rounded-2xl p-4 shadow-md transition ${
            canSave
              ? 'bg-gradient-to-r from-teal via-sage to-butter text-white hover:shadow-lg'
              : 'bg-paper text-ink/30 cursor-not-allowed'
          }`}
        >
          {canSave ? '✓ save and start tracking' : 'add a title and pattern to save'}
        </button>
      </div>
    </div>
  );
}

// ============================================================
//   TRACKER PAGE
// ============================================================
function TrackerPage({ pattern }) {
  const [checked, setChecked] = useState(() => loadProgress(pattern.id));

  useEffect(() => { saveProgress(pattern.id, checked); }, [checked, pattern.id]);

  const toggle = (id) => {
    setChecked((prev) => {
      const next = { ...prev, [id]: !prev[id] };
      if (!next[id]) delete next[id];
      return next;
    });
  };
  const reset = () => {
    if (window.confirm('Reset all progress for this project?')) setChecked({});
  };

  const totalRows = pattern.sections.reduce((s, sec) => s + sec.rows.length, 0);
  const completedRows = Object.keys(checked).filter((k) => checked[k]).length;
  const overallPct = totalRows > 0 ? Math.round((completedRows / totalRows) * 100) : 0;

  return (
    <div className="min-h-screen p-4 pb-24">
      <div className="max-w-2xl mx-auto">
        <button
          onClick={() => navigate('')}
          className="font-script text-xl text-teal-deep hover:text-teal mb-2 mt-2 inline-flex items-center gap-1"
        >
          ← all projects
        </button>

        <BrandHeader small />

        <div className="text-center mb-6">
          <div className="text-5xl mb-1">{pattern.emoji}</div>
          <h2 className="font-serif text-3xl text-ink">{pattern.title}</h2>
          {pattern.blurb && <p className="font-sans text-sm text-ink/60 mt-1">{pattern.blurb}</p>}
          {pattern.videoUrl && (
            <a
              href={pattern.videoUrl}
              target="_blank"
              rel="noopener noreferrer"
              className="inline-block font-script text-lg text-coral-deep hover:text-coral mt-1"
            >
              video tutorial ↗
            </a>
          )}
        </div>

        <div className="bg-cream rounded-2xl shadow-sm p-4 mb-6 border border-ink/10">
          <div className="flex justify-between items-center mb-2">
            <span className="font-script text-xl text-ink">overall progress</span>
            <span className="font-serif text-lg text-teal-deep">{completedRows} / {totalRows}</span>
          </div>
          <div className="w-full bg-paper rounded-full h-3 overflow-hidden">
            <div
              className="h-full bg-gradient-to-r from-teal via-butter to-coral transition-all duration-300"
              style={{ width: `${overallPct}%` }}
            />
          </div>
          <div className="flex justify-between items-center mt-3">
            <span className="font-sans text-sm text-ink/60">{overallPct}% complete</span>
            <button onClick={reset} className="font-sans text-xs text-ink/40 hover:text-coral-deep">
              ↻ reset
            </button>
          </div>
        </div>

        {pattern.sections.map((section, sIdx) => {
          const theme = THEMES[section.theme] || THEMES.teal;
          const sectionDone = section.rows.filter((r) => checked[r.id]).length;
          const sectionPct = Math.round((sectionDone / section.rows.length) * 100);
          const isComplete = sectionDone === section.rows.length;

          return (
            <div
              key={sIdx}
              className={`${theme.bg} ${theme.border} border-2 rounded-2xl p-4 mb-4 shadow-sm`}
            >
              <div className="flex justify-between items-start mb-2">
                <div>
                  <h3 className={`font-script text-3xl ${theme.text} flex items-center gap-2 leading-none`}>
                    {section.section}
                    {isComplete && <span className="text-sage-deep">✓</span>}
                  </h3>
                  {section.notes && (
                    <p className="font-sans text-xs text-ink/60 italic mt-2">{section.notes}</p>
                  )}
                </div>
                <span className={`font-serif text-sm ${theme.text} whitespace-nowrap ml-2`}>
                  {sectionDone}/{section.rows.length}
                </span>
              </div>

              <div className="w-full bg-cream/80 rounded-full h-1.5 mb-3 overflow-hidden">
                <div
                  className={`h-full ${theme.bar} transition-all duration-300`}
                  style={{ width: `${sectionPct}%` }}
                />
              </div>

              <div className="space-y-2">
                {section.rows.map((row) => {
                  const isChecked = !!checked[row.id];
                  return (
                    <button
                      key={row.id}
                      onClick={() => toggle(row.id)}
                      className={`w-full text-left flex items-start gap-3 p-3 rounded-lg transition-all ${
                        isChecked ? 'bg-cream/70 opacity-60' : 'bg-cream/90 hover:bg-cream shadow-sm'
                      }`}
                    >
                      <div
                        className={`flex-shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center mt-0.5 transition ${
                          isChecked
                            ? 'bg-teal-deep border-teal-deep text-white'
                            : 'bg-cream border-ink/30'
                        }`}
                      >
                        {isChecked && '✓'}
                      </div>
                      <div className="flex-1 min-w-0">
                        <span
                          className={`font-sans text-sm ${
                            isChecked ? 'line-through text-ink/50' : 'text-ink'
                          }`}
                        >
                          {row.label}
                        </span>
                        {row.count && (
                          <span
                            className={`ml-2 font-serif text-xs font-semibold ${
                              isChecked ? 'text-ink/40' : theme.text
                            }`}
                          >
                            {row.count}
                          </span>
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}

        {overallPct === 100 && (
          <div className="bg-gradient-to-r from-teal-soft via-butter-soft to-coral-soft rounded-2xl p-6 text-center shadow-md border border-ink/10">
            <div className="text-5xl mb-2">{pattern.emoji}✨</div>
            <h2 className="font-serif text-2xl text-ink">you did it</h2>
            <p className="font-script text-2xl text-teal-deep mt-1">your {pattern.title.toLowerCase()} is complete</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
//   APP
// ============================================================
function App() {
  const route = useHashRoute();
  const [userPatterns, setUserPatterns] = useState(() => loadUserPatterns());

  const allPatterns = useMemo(
    () => ({ ...BUILT_IN_PATTERNS, ...userPatterns }),
    [userPatterns]
  );

  const handleSavePattern = (pattern) => {
    const next = { ...userPatterns, [pattern.id]: pattern };
    setUserPatterns(next);
    saveUserPatterns(next);
  };

  const handleDeletePattern = (id) => {
    if (!window.confirm('Delete this project and all its progress?')) return;
    const next = { ...userPatterns };
    delete next[id];
    setUserPatterns(next);
    saveUserPatterns(next);
    localStorage.removeItem(PROGRESS_KEY(id));
  };

  if (!route) return <HomePage allPatterns={allPatterns} onDelete={handleDeletePattern} />;
  if (route === 'builder') return <BuilderPage onSave={handleSavePattern} />;

  const pattern = allPatterns[route];
  if (!pattern) {
    return (
      <div className="min-h-screen p-4 flex items-center justify-center">
        <div className="bg-cream rounded-2xl shadow-md p-6 text-center max-w-sm border border-ink/10">
          <div className="text-4xl mb-2">🤔</div>
          <h2 className="font-serif text-xl text-ink mb-2">project not found</h2>
          <p className="font-sans text-sm text-ink/60 mb-4">There's no project called "{route}".</p>
          <button
            onClick={() => navigate('')}
            className="px-4 py-2 bg-teal hover:bg-teal-deep text-white rounded-lg font-sans text-sm"
          >
            back to projects
          </button>
        </div>
      </div>
    );
  }
  return <TrackerPage pattern={pattern} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
